<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>BabyJohnHub</title>

<meta name="theme-color"
content="#0A84FF">

<meta name="description"
content="Watch Unlimited Movies, Web Series and Premium Content">

<link rel="icon"
type="image/png"
href="images/favicon.png">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="css/style.css">

<link rel="stylesheet"
href="css/header.css">

<link rel="stylesheet"
href="css/home.css">

<link rel="stylesheet"
href="css/player.css">

<link rel="stylesheet"
href="css/premium.css">

<link rel="stylesheet"
href="css/payment.css">

<link rel="stylesheet"
href="css/profile.css">

<link rel="stylesheet"
href="css/settings.css">

<link rel="stylesheet"
href="css/footer.css">

<link rel="stylesheet"
href="css/responsive.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<!-- =====================================
BabyJohnHub Application
Final Production Version
===================================== -->

<div id="app">

<!-- Splash Screen Start -->

<section id="splashScreen">

<div class="splash-logo">

<img
src="images/logo.png"
alt="BabyJohnHub Logo">

<h1>

BabyJohn<span>Hub</span>

</h1>

<p>

Entertainment Without Limits

</p>

</div>

<div class="loading-area">

<div class="loading-bar">

<div class="loading-progress">

</div>

</div>

<span id="loadingPercent">

0%

</span>

</div>

</section>

<!-- Welcome Screen Starts Here -->
<!-- =====================================
WELCOME SCREEN
===================================== -->

<section id="welcomeScreen" class="hidden">

    <div class="welcome-container">

        <div class="welcome-logo">

            <img src="images/logo.png" alt="BabyJohnHub">

        </div>

        <h1>

            Welcome to

            <span>BabyJohnHub</span>

        </h1>

        <p>

            Unlimited Movies, Web Series & More

        </p>

        <div class="welcome-poster">

            <img src="images/welcome-banner.jpg"
                 alt="Welcome Banner">

        </div>

        <button id="loginBtn"
                class="primary-btn">

            Login

        </button>

        <button id="registerBtn"
                class="secondary-btn">

            Create Account

        </button>

        <button id="guestBtn"
                class="guest-btn">

            Continue as Guest

        </button>

        <div class="welcome-features">

            <div>

                <i class="fa-solid fa-mobile-screen"></i>

                <span>Watch Anywhere</span>

            </div>

            <div>

                <i class="fa-solid fa-film"></i>

                <span>HD Quality</span>

            </div>

            <div>

                <i class="fa-solid fa-crown"></i>

                <span>Ad-Free Experience</span>

            </div>

        </div>

    </div>

</section>

<!-- =====================================
LOGIN SCREEN
===================================== -->

<section id="loginScreen" class="hidden">

    <div class="login-container">

        <button class="back-btn">

            <i class="fa-solid fa-arrow-left"></i>

        </button>

        <h2>Login</h2>

        <p>

            Login to continue to BabyJohnHub

        </p>

        <label>

            Mobile Number

        </label>

        <div class="mobile-input">

            <span>+91</span>

            <input
                type="tel"
                id="mobileNumber"
                placeholder="Enter mobile number"
                maxlength="10">

        </div>

        <button
            id="sendOtpBtn"
            class="primary-btn">

            Send OTP

        </button>

        <p class="continue-text">

            or continue with

        </p>

        <button class="google-login">

            <i class="fa-brands fa-google"></i>

            Continue with Google

        </button>

        <button class="facebook-login">

            <i class="fa-brands fa-facebook"></i>

            Continue with Facebook

        </button>

        <button class="apple-login">

            <i class="fa-brands fa-apple"></i>

            Continue with Apple

        </button>

        <p class="signup-link">

            Don't have an account?

            <a href="#">

                Sign Up

            </a>

        </p>

    </div>

</section>

<!-- OTP SCREEN STARTS HERE -->
